<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Çevrimdışı</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; padding: 20px; }
        .kart { width: 100%; max-width: 420px; background: #ffffff; border-radius: 16px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); padding: 28px; text-align: center; }
        .kart h1 { font-size: 24px; color: #111827; margin-bottom: 12px; }
        .kart p { color: #475569; line-height: 1.6; margin-bottom: 18px; }
        .kart button { background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 12px 18px; font-size: 14px; font-weight: 700; cursor: pointer; }
        .kart button:hover { opacity: 0.95; }
    </style>
</head>
<body>
    <div class="kart">
        <h1>Çevrimdışı Mod</h1>
        <p>Şu anda internet bağlantınız yok veya sunucuya ulaşılamıyor. Bu sayfa bir önbellek yedekleme sayfasıdır.</p>
        <button type="button" onclick="window.location.href='index.html'">Ana Sayfaya Dön</button>
    </div>
</body>
</html>
