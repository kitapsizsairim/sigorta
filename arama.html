<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Sigorta PWA">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
    <title>Gelişmiş Poliçe Arama</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; min-height: 100vh; padding: 10px 0; }
        .mobil-ekran { width: 100%; max-width: 430px; background: #ffffff; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-radius: 12px; display: block; padding-bottom: 30px; }
        header { border-bottom: 1px solid #e5e7eb; padding: 15px; }
        main { padding: 15px; display: block; width: 100%; }
        .form-bolum-baslik { font-size: 13px; font-weight: bold; color: #1d4ed8; text-transform: uppercase; margin: 20px 0 12px 0; border-bottom: 2px solid #ef4444; padding-bottom: 3px; text-align: left; }
        .satir-iki { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .form-grup { text-align: left; width: 100%; }
        .form-grup label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #4b5563; }
        .form-grup input, .form-grup select { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 12px; outline: none; }
        .sonuc-kapsayici { margin-top: 15px; }
        .police-kart { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; margin-bottom: 10px; text-align: left; }
        .kart-baslik { font-size: 14px; font-weight: bold; color: #111827; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .kart-detay { font-size: 12px; color: #4b5563; margin-bottom: 3px; }
        .etiket { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; }
        .etiket-aktif { background: #059669; }
        .etiket-iptal { background: #dc2626; }
        .etiket-borc { background: #d97706; }
        footer { padding: 15px; background: #f9fafb; border-top: 1px solid #e5e7eb; text-align: center; margin-top: 20px; border-radius: 0 0 12px 12px; }
    </style>
</head>
<body>
    <div class="mobil-ekran">
        <header><h1 style="font-weight: bold; font-size: 16px; color:#1d4ed8;" id="arama-acente-adi">Güven Sigorta</h1></header>
        <main>
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                <button type="button" onclick="location.href='index.html';" style="padding: 6px 12px; background: #e5e7eb; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size:13px;">← Ana Menü</button>
                <h2 style="font-size: 14px; font-weight: bold;">Gelişmiş Poliçe Arama</h2>
            </div>

            <div class="form-bolum-baslik">Arama Filtreleri</div>
            <div class="satir-iki">
                <div class="form-grup"><label>Adı Soyadı</label><input type="text" id="arama-ad" placeholder="Müşteri adı..."></div>
                <div class="form-grup"><label>Poliçe No</label><input type="text" id="arama-no" placeholder="Poliçe no..."></div>
            </div>
            <div class="satir-iki">
                <div class="form-grup"><label>Müşteri TC / Vergi</label><input type="number" id="arama-tc"></div>
                <div class="form-grup"><label>Plaka</label><input type="text" id="arama-plaka" placeholder="34ABC123"></div>
            </div>
            <div class="satir-iki">
                <div class="form-grup">
                    <label>Şirket Adı</label>
                    <select id="arama-sirket">
                        <option value="HEPSI">-- Tümü --</option>
                        <option>Acıbadem</option>
                        <option>Acn Türk</option>
                        <option>Aegon</option>
                        <option>Ak Sigorta</option>
                        <option>Allianz</option>
                        <option>Ana Sigorta</option>
                        <option>Anadolu</option>
                        <option>Ankara</option>
                        <option>Arex</option>
                        <option>Atlas</option>
                        <option>Aveon</option>
                        <option>Axa</option>
                        <option>Bereket</option>
                        <option>Corpus</option>
                        <option>Doğa</option>
                        <option>Emaa</option>
                        <option>Ethica</option>
                        <option>Eureko</option>
                        <option>Gulf</option>
                        <option>Hdi</option>
                        <option>Hepiyi</option>
                        <option>Koru</option>
                        <option>Magdeburger</option>
                        <option>Mapfre</option>
                        <option>Neova</option>
                        <option>Orient</option>
                        <option>Quick</option>
                        <option>Ray Sigorta</option>
                        <option>Referans</option>
                        <option>Sompo</option>
                        <option>Şeker</option>
                        <option>Türk Nippon</option>
                        <option>Türkiye</option>
                        <option>Türkiye Katılım</option>
                        <option>Unico</option>
                        <option>Zürih</option>
                    </select>
                </div>
                <div class="form-grup">
                    <label>Poliçe Türü (Branş)</label>
                    <select id="arama-branis">
                        <option value="HEPSI">-- Tümü --</option>
                        <option>Trafik</option>
                        <option>Kasko</option>
                        <option>İmm</option>
                        <option>Yol Yardımı</option>
                        <option>Dask</option>
                        <option>Konut</option>
                        <option>İşyeri</option>
                        <option>Yangın</option>
                        <option>Tamamlayıcı Sağlık</option>
                        <option>Özel Sağlık</option>
                        <option>Hayat Sigortası</option>
                        <option>Ferdi Kaza</option>
                        <option>Seyahat Sağlık</option>
                        <option>Nakliyat</option>
                        <option>Tarsim</option>
                        <option>All-Risk</option>
                        <option>Mesleki Sorumluluk</option>
                    </select>
                </div>
            </div>
            <div class="satir-iki">
                <div class="form-grup"><label>Cep Telefonu</label><input type="text" id="arama-telefon" placeholder="0532..."></div>
                <div class="form-grup"><label>Araç Marka ve Tipi</label><input type="text" id="arama-marka" placeholder="Renault Megane"></div>
            </div>
            <div class="satir-iki">
                <div class="form-grup"><label>Araç Modeli</label><input type="text" id="arama-model" placeholder="2025 model"></div>
                <div class="form-grup">
                    <label>Araç Cinsi</label>
                    <select id="arama-cinsi">
                        <option value="HEPSI">-- Tümü --</option>
                        <option>01 - Otomobil</option>
                        <option>02 - Taksi</option>
                        <option>03 - Minibüs</option>
                        <option>04 - Otobüs 16-30</option>
                        <option>05 - Otobüs 31-56</option>
                        <option>06 - Kamyonet</option>
                        <option>07 - Kamyon</option>
                        <option>08 - İş Makinesi</option>
                        <option>09 - Traktör</option>
                        <option>10 - Römork</option>
                        <option>11 - Motorsiklet</option>
                        <option>12 - Tanker</option>
                        <option>13 - Çekici</option>
                        <option>14 - Özel Amaçlı Taşıt</option>
                    </select>
                </div>
            </div>
            <div class="satir-iki">
                <div class="form-grup">
                    <label>Özel Durum Süzgeci</label>
                    <select id="arama-ozeldurum">
                        <option value="HEPSI">-- Tümü --</option><option value="IPTAL">İptal Edilenler</option><option value="BORC">Borcu Olanlar</option><option value="SURE_BITEN">Süresi Bitenler</option>
                    </select>
                </div>
                <div class="form-grup"><label>Kalan Gün (Eşit/Küçük)</label><input type="number" id="arama-kalangun"></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px;">
                <div class="form-grup"><label>Vade Günü</label><select id="vade-gun"><option value="HEPSI">Tümü</option></select></div>
                <div class="form-grup">
                    <label>Vade Ayı</label>
                    <select id="vade-ay">
                        <option value="HEPSI">Tümü</option><option value="01">Ocak</option><option value="02">Şubat</option><option value="03">Mart</option><option value="04">Nisan</option><option value="05">Mayıs</option><option value="06">Haziran</option><option value="07">Temmuz</option><option value="08">Ağustos</option><option value="09">Eylül</option><option value="10">Ekim</option><option value="11">Kasım</option><option value="12">Aralık</option>
                    </select>
                </div>
                <div class="form-grup"><label>Vade Yılı</label><select id="vade-yil"><option value="HEPSI">Tümü</option><option>2026</option><option>2027</option></select></div>
            </div>

            <button type="button" onclick="aramaYap()" style="width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size:14px;">🔍 Poliçeleri Sorgula</button>
            <div class="form-bolum-baslik">Arama Sonuçları (<span id="sonuc-sayisi">0</span>)</div>
            <div class="sonuc-kapsayici" id="sonuc-listesi"></div>
        </main>
        <footer><p style="font-size: 11px; color: #6b7280;">Acente Arama Motoru © 2026</p></footer>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const hAd = localStorage.getItem("cfg_acenteAd") || "Güven Sigorta";
            document.getElementById("arama-acente-adi").innerText = hAd;
            const gSel = document.getElementById("vade-gun");
            for(let i=1; i<=31; i++) {
                let v = i < 10 ? "0" + i : i.toString();
                gSel.innerHTML += '<option value="' + v + '">' + i + '</option>';
            }
            aramaYap();
        });

        const DB = [
            { no: "554433/1", ad: "Ahmet Yılmaz", tc: "12345678901", plaka: "34ABC123", sirket: "Doğa", brans: "Trafik", durum: "IPTAL", borc: 0, bitis: "2026-03-15", kalanGun: 0, telefon: "05321234567", marka: "Renault", model: "Megane", cinsi: "01 - Otomobil" },
            { no: "998877/0", ad: "Mehmet Demir", tc: "98765432102", plaka: "06XYZ99", sirket: "Türk Nippon", brans: "Kasko", durum: "AKTIF", borc: 1250, bitis: "2026-08-20", kalanGun: 45, telefon: "05451234567", marka: "BMW", model: "320i", cinsi: "01 - Otomobil" },
            { no: "112233/2", ad: "Ayşe Kaya", tc: "45612378903", plaka: "35TUR12", sirket: "Allianz", brans: "Dask", durum: "AKTIF", borc: 0, bitis: "2026-03-28", kalanGun: 14, telefon: "05551234567", marka: "Toyota", model: "2025 model", cinsi: "01 - Otomobil" }
        ];

        function aramaYap() {
            const fAd = document.getElementById("arama-ad").value.toLowerCase();
            const fNo = document.getElementById("arama-no").value;
            const fTc = document.getElementById("arama-tc").value;
            const fPl = document.getElementById("arama-plaka").value.toLowerCase();
            const fTelefon = document.getElementById("arama-telefon").value.toLowerCase();
            const fMarka = document.getElementById("arama-marka").value.toLowerCase();
            const fModel = document.getElementById("arama-model").value.toLowerCase();
            const fCinsi = document.getElementById("arama-cinsi").value;
            const fSi = document.getElementById("arama-sirket").value;
            const fBr = document.getElementById("arama-branis").value;
            const fOz = document.getElementById("arama-ozeldurum").value;
            const fKl = document.getElementById("arama-kalangun").value;
            const fGn = document.getElementById("vade-gun").value;
            const fAy = document.getElementById("vade-ay").value;
            const fYl = document.getElementById("vade-yil").value;
            const resArea = document.getElementById("sonuc-listesi");
            resArea.innerHTML = "";

            let res = DB.filter(p => {
                const [y, m, d] = p.bitis.split("-");
                if (fAd && !p.ad.toLowerCase().includes(fAd)) return false;
                if (fNo && !p.no.includes(fNo)) return false;
                if (fTc && !p.tc.includes(fTc)) return false;
                if (fPl && !p.plaka.toLowerCase().includes(fPl)) return false;
                if (fTelefon && !String(p.telefon || "").toLowerCase().includes(fTelefon)) return false;
                if (fMarka && !String(p.marka || "").toLowerCase().includes(fMarka)) return false;
                if (fModel && !String(p.model || "").toLowerCase().includes(fModel)) return false;
                if (fCinsi !== "HEPSI" && String(p.cinsi || "") !== fCinsi) return false;
                if (fSi !== "HEPSI" && p.sirket !== fSi) return false;
                if (fBr !== "HEPSI" && p.brans !== fBr) return false;
                if (fKl && p.kalanGun > parseInt(fKl)) return false;
                if (fGn !== "HEPSI" && d !== fGn) return false;
                if (fAy !== "HEPSI" && m !== fAy) return false;
                if (fYl !== "HEPSI" && y !== fYl) return false;
                if (fOz === "IPTAL" && p.durum !== "IPTAL") return false;
                if (fOz === "BORC" && p.borc === 0) return false;
                if (fOz === "SURE_BITEN" && p.kalanGun > 30) return false;
                return true;
            });

            document.getElementById("sonuc-sayisi").innerText = res.length;
            if(res.length === 0) {
                resArea.innerHTML = '<p style="font-size:13px; color:#6b7280; margin-top:20px;">Kayıt yok.</p>';
                return;
            }

            res.forEach(p => {
                 let lbl = "";
                if (p.durum === "IPTAL") {
                    lbl = '<span class="etiket etiket-iptal">İptal</span>';
                } else if (p.borc > 0) {
                    lbl = '<span class="etiket etiket-borc">' + p.borc + ' ₺ Borç</span>';
                } else {
                    lbl = '<span class="etiket etiket-aktif">Aktif</span>';
                }
                
                resArea.innerHTML += '<div class="police-kart">' +
                    '<div class="kart-baslik"><span>🚗 ' + p.plaka.toUpperCase() + '</span>' + lbl + '</div>' +
                    '<div class="kart-detay"><strong>Müşteri:</strong> ' + p.ad + '</div>' +
                    '<div class="kart-detay"><strong>Poliçe No:</strong> ' + p.no + ' - ' + p.sirket + '</div>' +
                    '<div class="kart-detay"><strong>Cep Telefonu:</strong> ' + (p.telefon || '-') + '</div>' +
                    '<div class="kart-detay"><strong>Araç:</strong> ' + (p.marka || '-') + ' ' + (p.model || '-') + ' / ' + (p.cinsi || '-') + '</div>' +
                    '<div class="kart-detay" style="color:#b91c1c;"><strong>Vade:</strong> ' + 
                    p.bitis.split("-").reverse().join(".") + ' (' + p.kalanGun + ' Gün)</div>' +
                    '</div>';
            });
        }
    </script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("sw.js").then(reg => {
                    function showUpdate(registration) {
                        const banner = document.getElementById('sw-update-banner');
                        if (!banner) return;
                        banner.classList.remove('hidden');
                        const applyBtn = document.getElementById('sw-update-apply');
                        applyBtn.onclick = () => {
                            if (!registration || !registration.waiting) return;
                            registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                        };
                    }

                    if (reg.waiting) showUpdate(reg);
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdate(reg);
                            }
                        });
                    });

                    navigator.serviceWorker.addEventListener('controllerchange', () => {
                        window.location.reload();
                    });
                }).catch(err => console.log("PWA kayıt hatası:", err));
            });
        }
    </script>
    <div id="sw-update-banner" class="hidden" aria-live="polite" style="position:fixed;left:50%;transform:translateX(-50%);bottom:18px;background:#111827;color:#fff;padding:10px 14px;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,0.25);display:flex;gap:10px;align-items:center;z-index:9999;font-size:13px;">
        Yeni güncelleme hazır.
        <button id="sw-update-apply" style="background:#10b981;color:#fff;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;font-weight:700;">Şimdi Yenile</button>
    </div>
</body>
</html>
